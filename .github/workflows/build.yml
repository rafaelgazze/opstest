name: Build & Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-1

jobs:
  validate:
    name: Validate Terraform (${{ matrix.layer }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        layer: [network, app]
    defaults:
      run:
        working-directory: terraform/${{ matrix.layer }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

      - name: Setup tflint
        uses: terraform-linters/setup-tflint@v4

      - name: Init tflint
        run: tflint --init --config .tflint.hcl

      - name: Run tflint
        run: tflint --config .tflint.hcl

      - name: Run checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/${{ matrix.layer }}
          config_file: terraform/${{ matrix.layer }}/.checkov.yml
          framework: terraform

  build:
    name: Build JAR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: "11"
          cache: maven

      - name: Build with Maven
        run: mvn clean package

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/suchapp-0.0.1-SNAPSHOT.jar

  bake:
    name: Bake AMI
    needs: [validate, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      ami_id: ${{ steps.packer.outputs.ami_id }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/suchapp-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-packer@main

      - name: Packer init
        working-directory: packer
        run: packer init app.pkr.hcl

      - name: Packer build
        id: packer
        working-directory: packer
        run: |
          AMI_ID=$(packer build -machine-readable \
            -var "region=${{ env.AWS_REGION }}" \
            -var "app_version=${{ github.sha }}" \
            app.pkr.hcl | tee /dev/stderr | \
            grep 'artifact,0,id' | cut -d: -f2)
          echo "ami_id=$AMI_ID" >> "$GITHUB_OUTPUT"
          echo "Baked AMI: $AMI_ID"
